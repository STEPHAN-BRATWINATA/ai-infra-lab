# Ollama (servidor de LLM) implantado no cluster, usando a GPU via time-slicing,
# e exposto como Service NodePort (a "API de tokens" da mini AI Factory).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      runtimeClassName: nvidia
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      volumes:
      - name: models
        emptyDir: {}   # efemero: o modelo e re-baixado se o pod reiniciar.
                       # Para persistir, troque por um PersistentVolumeClaim.
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  type: NodePort
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
    nodePort: 31434
